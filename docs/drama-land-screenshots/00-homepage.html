-cn\",\"d\"]\n"])</script><script>self.__next_f.push([1,"11:[\"$\",\"$L12\",null,{\"locale\":\"zh-cn\",\"now\":\"$D2026-02-28T06:26:26.488Z\",\"timeZone\":\"UTC\",\"messages\":{\"metadata\":{\"home\":{\"title\":\"AI音乐MV生成平台｜音乐视频创作工具 - Drama.Land\",\"description\":\"Drama.Land是一个AI音乐MV生成平台。将一个点子转化为音乐视频，同时支持连载短剧和连续剧集视频创作，角色与风格保持一致。\"},\"privacyPolicy\":{\"title\":\"隐私政策｜Drama.Land AI音乐MV生成平台\",\"description\":\"阅读Drama.Land隐私政策，了解我们在提供AI音乐视频和剧情创作服务过程中，如何收集、使用与保护您的数据。\"},\"termsOfUse\":{\"title\":\"使用条款｜Drama.Land AI音乐MV生成平台\",\"description\":\"查看Drama.Land使用条款。了解账户使用规则、内容归属与授权，以及AI音乐MV与剧情视频生成服务的相关政策。\"},\"about\":{\"title\":\"关于Drama.Land｜AI音乐MV与剧情创作平台\",\"description\":\"了解Drama.Land的使命：赋能创作者用AI将简单的想法转化为完整的音乐MV和剧集。\"},\"superCreatorProgram\":{\"title\":\"超级创作者计划｜Drama.Land AI音乐MV平台\",\"description\":\"加入Drama.Land超级创作者计划，抢先体验AI音乐MV进阶功能，获得创作激励与专属支持，助力音乐MV与连载剧情内容创作。\"},\"projects\":{\"title\":\"我的项目｜AI音乐MV与剧情创作空间 - Drama.Land\",\"description\":\"在Drama.Land管理您的AI音乐MV与剧集视频项目。统一创建、编辑和持续迭代音乐MV与剧集内容。\"},\"assets\":{\"title\":\"资产库｜AI音乐MV与剧情创作空间 - Drama.Land\",\"description\":\"访问Drama.Land资产库，统一管理角色形象、视觉风格、场景与音乐元素，确保AI音乐MV与连载剧情创作中的一致性与持续表达。\"}},\"about\":{\"title\":\"关于我们\",\"header\":{\"headline\":\"关于 Drama.Land\",\"subhead\":\"一个叙事优先的 AI 平台，在这里，一个简单的想法就能变成一部音乐视频 —— 甚至更多\",\"description\":\"Drama.Land 是一个一体化的 AI 创意平台，建立在一个简单的信念之上：一个想法就足以开始创作。我们赋能音乐人、创作者和故事讲述者，将一个单一、抽象的想法转化为完整的音乐视频 —— 将节奏、歌词和情感转化为电影般的视觉叙事，无需任何剪辑、拍摄或复杂制作流程的经验。\"},\"intro\":{\"headline\":\"Drama.Land 的核心，是为 AI 音乐视频创作而生。\",\"body\":\"传统的 AI 视频工具往往需要繁琐的提示词、复杂的技术参数或割裂的工作流，而 Drama.Land 从最简单的起点出发：一个想法、一种感觉、一句歌词，或是一段旋律的火花。从这里开始，我们的系统能理解音乐的结构——节奏、配速、歌词含义和情感流动——并将其转化为富有用意、仿佛有人演绎且鲜活的视觉画面。音乐不再只是背景音，而是驱动每一帧画面的叙事引擎。\"},\"livingStory\":{\"headline\":\"从一个灵感到鲜活的故事\",\"quote\":\"大多数 AI 视频平台专注于生成短暂、孤立的片段。Drama.Land 则是为了下一阶段而建。\",\"body1\":\"在叙事优先的 AI 技术驱动下，Drama.Land 让创作者能够将最初的一个点子，随着时间推移演变为一个连贯的视觉故事。角色保持一致，视觉风格保持稳定，世界观跨越世代延续——这使得不仅仅是制作一支音乐视频成为可能，更能构建剧集内容、连载叙事，以及从最初概念自然生长出来的创意宇宙。\",\"body2\":\"我们拥有超过 100 种内置于叙事逻辑中的视觉风格，创作者无需重新开始编写提示词或手动管理技术设置。系统会自动保持叙事和视觉的完整性，因此创意可以持续发展，而不是每次生成都需要重置。\"},\"workflow\":{\"headline\":\"一个工作室。一种心流。无需切换工具。\",\"body1\":\"虽然像 Runway 或 Pika 这样的工具擅长制作单独的视觉特效，但 Drama.Land 提供的是单一的、端到端的创意工作流——从创意到音乐，再到视觉，最后成片。\",\"body2\":\"我们特意去除了传统的时间轴、复杂的图层和技术控制。取而代之的是，Drama.Land 引入了一种选择驱动的创作过程，感觉更像是在“玩”一个故事，而不是在操作软件。创作者引导基调、情绪和方向，而系统负责执行。这减少了创作疲劳，让从简单的起点积累长期作品成为可能。\",\"punchline\":\"一个想法输入。一支完整的音乐视频输出。\"},\"philosophy\":{\"headline\":\"我们的理念：让每个人都能通过创意表达\",\"subhead\":\"我们相信，创意表达应该是一种权利，而不是特权。\",\"body1\":\"长期以来，通过音乐和视觉讲述故事需要借助工具、技术技能、团队或昂贵的制作流程。Drama.Land 的建立就是为了改变这一点——通过降低门槛，让任何有想法的人都能进行创意表达。\",\"body2\":\"在 Drama.Land，创作始于意图，而非技术。你不需要理解时间轴、运镜、剪辑软件或复杂的工作流。你只需要一个想法、一种感觉，或者一个你想讲的故事。系统负责执行，让创作者可以专注于意义、情感和方向。\",\"equityQuote\":\"这就是我们眼中的创意平等：不是取代艺术家，而是扩大谁可以进行创作。\",\"body3\":\"在我们看来，AI 不是表达的替代品，而是开启表达的工具。通过消除技术障碍和制作开销，Drama.Land 让更多人有能力将他们的想法转化为完整的、可分享的作品。\",\"closing_p1\":\"你带来想法。\",\"closing_p2\":\"Drama.Land 让创作成为可能。\"}},\"navbar\":{\"back\":\"返回\",\"episode\":\"第 {number} 集\",\"joinWaitList\":\"获取邀请码\",\"logIn\":\"登录\",\"signUp\":\"注册\",\"signInOrRegister\":\"注册/登录\"},\"landing\":{\"topBanner\":{\"text\":\"🚀 模型\u0026链路双升级：Nano Banana 2 \u0026 Kling 3.0 已上线！限时全场 8 折。\"},\"hero\":{\"title\":\"把想法\",\"titleEpisodes\":\"“玩”成一部連續劇\",\"titleMusicVideo\":\"“玩”成一支音樂MV\",\"subtitle\":\"专为连续剧而生的全球首家一键直出AI智能剧组\",\"subtitleMusicVideo\":\"全球首家支持各种视频创作的一键直出AI智能剧组\"},\"quickStart\":{\"placeholder_multi_episodes\":\"哪怕只有一句话，也能开启你的系列剧。输入你的核心构思，我们会为你补全完整的全季脉络。\",\"placeholder_single_episode\":\"你的视频是关于什么的？试着描述画面、人物和核心信息。\",\"placeholder_script_based\":\"贴入剧本正文或对话，精准控制画面细节。支持标准剧本格式。\",\"placeholder_mv\":\"描述你的音乐MV构思或在此贴入歌词。我们将为你打造同步的视觉体验。\",\"video\":\"视频剧集\",\"videoDescription\":\"观看完整的动态剧集。\",\"storybook\":\"故事画板\",\"storybookDescription\":\"以关键帧呈现的视觉故事。\",\"episodes\":\"集\",\"create\":\"生成\",\"creating\":\"生成中...\",\"characters\":\"字符\",\"creditCost\":\"积分消耗\",\"projectType\":{\"season\":\"连续剧集\",\"single\":\"单集视频\",\"script\":\"剧本模式\",\"music_mv\":\"音乐MV\"},\"asset\":\"资产\",\"language\":{\
